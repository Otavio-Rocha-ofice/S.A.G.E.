<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <title>Home</title>

    <link rel="stylesheet" href="./Estilos-Telas/style.css">

</head>
<body>

    <div id="barra-container"></div>

    <script>

        fetch('../Componentes/Barra.html')
        .then(response => response.text())
        .then(data => {

            document.getElementById('barra-container').innerHTML = data;

            document.getElementById('estoque')
            .classList.add('active');

        });

    </script>

</body>
</html>
