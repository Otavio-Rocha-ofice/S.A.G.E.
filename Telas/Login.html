<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.A.G.E - Login</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="cartao-login">

  <div class="logo text-center">
  <div class="icone-logo">
  🔧
</div>
    <h3>S.A.G.E.</h3>
    <small>SISTEMA AUXILIAR DE GERENCIAMENTO</small>
  </div>

  <h5 class="text-center mb-4">Acesse sua conta</h5>

  <form>
    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" required>
    </div>

    <!-- Senha -->
    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input type="password" class="form-control" required>
    </div>

    <button type="submit" class="btn botao-laranja w-100">
      Entrar no Sistema
    </button>
  </form>

  <div class="suporte">
    Problemas para acessar? <a href="#">Fale com o suporte</a>
  </div>

  <div class="rodape">
    © 2026 S.A.G.E. Todos os direitos reservados.
  </div>

</div>

</body>
</html>
